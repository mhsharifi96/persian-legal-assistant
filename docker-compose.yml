# Local Neo4j runtime for the standalone graph import utilities.
services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-please-change}
    volumes:
      - neo4j_data:/data
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-please-change} 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  qdrant_data:
  neo4j_data:

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "persian-legal-assistant"
version = "0.1.0"
description = "Persian legal assistant architecture and GraphRAG ingestion foundation."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pyrefly>=1.1.1",
    "pytest>=8.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
markers = [
    "integration: tests that require external services",
]

[tool.pyrefly]
project-includes = [
    "src/**/*.py",
    "tests/**/*.py",
]
